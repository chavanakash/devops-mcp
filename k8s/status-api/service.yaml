apiVersion: v1
kind: Service
metadata:
  name: status-api
  labels:
    app: status-api
spec:
  # Docker Desktop's Kubernetes auto-binds LoadBalancer services to localhost —
  # no NodePort/port-forward dance needed for local access.
  type: LoadBalancer
  selector:
    app: status-api
  ports:
    - port: 8080
      targetPort: 8080
