apiVersion: apps/v1
kind: Deployment
metadata:
  name: status-api
  labels:
    app: status-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: status-api
  template:
    metadata:
      labels:
        app: status-api
    spec:
      # Created/refreshed by the node's ecr-cred-refresh systemd timer (see
      # infra/terraform/modules/k3s-node/user_data.sh.tpl) — plain k3s has no
      # built-in AWS SigV4 support for pulling from a private ECR repo.
      imagePullSecrets:
        - name: ecr-pull-secret
      containers:
        - name: status-api
          image: status-api # rewritten by kustomization.yaml's images: block
          ports:
            - containerPort: 8080
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
