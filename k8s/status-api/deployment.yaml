apiVersion: apps/v1
kind: Deployment
metadata:
  name: status-api
  labels:
    app: status-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: status-api
  template:
    metadata:
      labels:
        app: status-api
    spec:
      # One-time manual secret (a GitHub PAT with read:packages scope) — see
      # runbooks/local-cluster-access.md. Unlike ECR, ghcr.io PATs don't expire
      # every 12h, so this needs no refresh automation.
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: status-api
          image: status-api # rewritten by kustomization.yaml's images: block
          ports:
            - containerPort: 8080
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
