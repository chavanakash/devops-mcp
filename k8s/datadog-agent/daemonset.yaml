# APM/process/log collection stay disabled — this is a portfolio demo, not a
# production fleet, and core system + kubelet metrics are enough to back a
# dashboard. Real resources here (Docker Desktop on a real machine, not a
# 1GiB cloud instance), so the limits below have real headroom, not a survival
# minimum.
#
# Expects a `datadog-secret` Secret (key: api-key) in this namespace, created
# out-of-band (see runbooks/datadog-agent-setup.md) — the API key is never
# committed to this repo.
#
# hostPath below assumes Docker Desktop's Kubernetes containerd socket
# location; adjust if running on a different local cluster (kind/minikube use
# different paths).
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: datadog-agent
  namespace: datadog
  labels:
    app: datadog-agent
spec:
  selector:
    matchLabels:
      app: datadog-agent
  template:
    metadata:
      labels:
        app: datadog-agent
    spec:
      serviceAccountName: datadog-agent
      containers:
        - name: agent
          image: gcr.io/datadoghq/agent:7
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          env:
            - name: DD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: datadog-secret
                  key: api-key
            - name: DD_SITE
              value: "datadoghq.com"
            - name: DD_KUBERNETES_KUBELET_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: KUBERNETES
              value: "true"
            - name: DD_APM_ENABLED
              value: "false"
            - name: DD_PROCESS_AGENT_ENABLED
              value: "false"
            - name: DD_LOGS_ENABLED
              value: "false"
            - name: DD_TAGS
              value: "project:devops-mcp"
          volumeMounts:
            # Docker Desktop's Kubernetes reports containerRuntimeVersion as
            # docker://... (a Docker-backed CRI), unlike k3s's raw containerd —
            # mount the Docker socket instead. Not yet verified end-to-end
            # against a real Datadog account (this whole DaemonSet is opt-in
            # and undeployed until you set enable_datadog-equivalent up) —
            # double-check container-level metrics actually populate once you do.
            - name: dockersocket
              mountPath: /var/run/docker.sock
              readOnly: true
            - name: procdir
              mountPath: /host/proc
              readOnly: true
            - name: cgroups
              mountPath: /host/sys/fs/cgroup
              readOnly: true
            - name: http-check-config
              mountPath: /etc/datadog-agent/conf.d/http_check.d/conf.yaml
              subPath: conf.yaml
              readOnly: true
      volumes:
        - name: dockersocket
          hostPath:
            path: /var/run/docker.sock
        - name: procdir
          hostPath:
            path: /proc
        - name: cgroups
          hostPath:
            path: /sys/fs/cgroup
        - name: http-check-config
          configMap:
            name: datadog-http-check
