name: deploy site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/site-deploy.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - run: npm ci

      - name: build
        run: npm run build
        env:
          # The ngrok URL for status-api — changes whenever the tunnel restarts.
          # See runbooks/local-cluster-access.md. Unset = widget just shows
          # "not configured" instead of failing the build.
          PUBLIC_STATUS_API_URL: ${{ vars.STATUS_API_URL }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

      - name: notify slack
        if: always()
        run: |
          status="${{ job.status }}"
          curl -sf -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"site deploy: ${status}\"}" \
            "${{ secrets.SLACK_WEBHOOK_URL }}" || true
