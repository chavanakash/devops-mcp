name: terraform apply

on:
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

defaults:
  run:
    working-directory: infra/terraform/envs/prod

jobs:
  apply:
    runs-on: ubuntu-latest
    # Requires manual approval: configure a "production" GitHub Environment with
    # required reviewers under Settings → Environments before relying on this gate.
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=prod/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_STATE_LOCK_TABLE }}"

      - name: terraform apply
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
          PAGERDUTY_TOKEN: ${{ secrets.PAGERDUTY_TOKEN }}
        run: |
          terraform apply -auto-approve -input=false \
            -var="alert_email=${{ vars.ALERT_EMAIL }}" \
            -var="github_repo=${{ github.repository }}" \
            -var="pagerduty_user_email=${{ vars.PAGERDUTY_USER_EMAIL }}"

      - name: notify slack
        if: always()
        run: |
          status="${{ job.status }}"
          curl -sf -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"terraform apply on devops-mcp: ${status}\"}" \
            "${{ secrets.SLACK_WEBHOOK_URL }}" || true
