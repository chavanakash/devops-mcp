name: status-api CI

on:
  push:
    branches: [main]
    paths:
      - "apps/status-api/**"
      - ".github/workflows/status-api-ci.yml"
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/devops-mcp-status-api

permissions:
  contents: write # to commit the new image tag back to k8s/status-api
  packages: write # to push to ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build image
        id: build
        working-directory: apps/status-api
        run: |
          tag="${GITHUB_SHA::12}"
          docker build -t "$IMAGE:$tag" -t "$IMAGE:latest" .
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      # Fails the build on HIGH/CRITICAL vulnerabilities in the image itself
      # (OS packages + npm deps) before anything gets pushed.
      - name: scan image (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "${{ env.IMAGE }}:${{ steps.build.outputs.tag }}"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      - name: push image
        run: |
          docker push "$IMAGE:${{ steps.build.outputs.tag }}"
          docker push "$IMAGE:latest"

      - name: bump image tag for Argo CD (GitOps)
        working-directory: k8s/status-api
        run: |
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz" | tar xz
          ./kustomize edit set image "status-api=${{ env.IMAGE }}:${{ steps.build.outputs.tag }}"
          rm -f ./kustomize

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kustomization.yaml
          git diff --cached --quiet || git commit -m "status-api: deploy ${{ steps.build.outputs.tag }}"
          git push

      - name: notify slack
        if: always()
        run: |
          status="${{ job.status }}"
          curl -sf -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"status-api CI: ${status}\"}" \
            "${{ secrets.SLACK_WEBHOOK_URL }}" || true
