name: status-api CI

on:
  push:
    branches: [main]
    paths:
      - "apps/status-api/**"
      - ".github/workflows/status-api-ci.yml"
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: write # to commit the new image tag back to k8s/status-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login

      - name: build and push image
        id: build
        working-directory: apps/status-api
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
        run: |
          tag="${GITHUB_SHA::12}"
          docker build -t "$REGISTRY/$REPOSITORY:$tag" -t "$REGISTRY/$REPOSITORY:latest" .
          docker push "$REGISTRY/$REPOSITORY:$tag"
          docker push "$REGISTRY/$REPOSITORY:latest"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: bump image tag for Argo CD (GitOps)
        working-directory: k8s/status-api
        run: |
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz" | tar xz
          ./kustomize edit set image "status-api=${{ steps.ecr-login.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ steps.build.outputs.tag }}"
          rm -f ./kustomize

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kustomization.yaml
          git diff --cached --quiet || git commit -m "status-api: deploy ${{ steps.build.outputs.tag }}"
          git push

      - name: notify slack
        if: always()
        run: |
          status="${{ job.status }}"
          curl -sf -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"status-api CI: ${status}\"}" \
            "${{ secrets.SLACK_WEBHOOK_URL }}" || true
