name: terraform plan

on:
  pull_request:
    paths:
      - "infra/terraform/**"

permissions:
  id-token: write # required for OIDC
  contents: read
  pull-requests: write # to comment the plan on the PR

defaults:
  run:
    working-directory: infra/terraform/envs/prod

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=prod/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_STATE_LOCK_TABLE }}"

      - name: terraform fmt check
        run: terraform fmt -check -recursive ../../

      - name: terraform validate
        run: terraform validate

      - name: terraform plan
        id: plan
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
          PAGERDUTY_TOKEN: ${{ secrets.PAGERDUTY_TOKEN }}
        run: |
          terraform plan -no-color -input=false \
            -var="alert_email=${{ vars.ALERT_EMAIL }}" \
            -var="github_repo=${{ github.repository }}" \
            -var="pagerduty_user_email=${{ vars.PAGERDUTY_USER_EMAIL }}" \
            -out=tfplan | tee plan.txt
        continue-on-error: true

      - name: comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/terraform/envs/prod/plan.txt', 'utf8').slice(-60000);
            const body = `#### Terraform Plan\n<details><summary>Show plan</summary>\n\n\`\`\`\n${plan}\n\`\`\`\n</details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1
